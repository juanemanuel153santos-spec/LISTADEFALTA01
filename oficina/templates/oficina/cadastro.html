{% extends 'oficina/base.html' %}
{% block titulo %}Cadastro{% endblock %}
{% block conteudo %}
    <h1>Criar conta</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Cadastrar</button>
    </form>
    <p>Já tem conta? <a href="{% url 'login' %}">Entrar</a></p>
{% endblock %}
